[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=services
    --cov=config
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-fail-under=77
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (may require running services)
    slow: Slow running tests
